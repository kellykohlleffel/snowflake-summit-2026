<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- "S" for Snowflake rendered as 3x3 squares in a 3-column, 5-row grid.
       Matches the visual style of fivetran-code's activity bar icon (squares
